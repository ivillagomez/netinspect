<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetInspect</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            <path d="M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
          </svg>
          NetInspect
        </div>
        <div class="header-meta" id="deviceSummary">
          <span class="badge badge-neutral">Loading devices…</span>
        </div>
      </div>
    </header>

    <!-- Search bar -->
    <section class="search-section">
      <div class="search-card glass">
        <div class="search-title">Inspect a network device</div>
        <div class="search-row">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="MAC address · IP address · FortiGate address name"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn-trace" id="traceBtn" onclick="doTrace()">
            <span class="btn-label">Trace</span>
            <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
          </button>
        </div>
        <div class="search-examples">
          Examples: &nbsp;
          <code onclick="fillExample(this)">aa:bb:cc:dd:ee:ff</code>
          <code onclick="fillExample(this)">192.168.1.100</code>
          <code onclick="fillExample(this)">Server-Web-01</code>
        </div>

        <!-- Diagnostic Options -->
        <div class="options-toggle" onclick="toggleOptions()">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
          </svg>
          <span id="optionsToggleLabel">Diagnostics: All enabled</span>
          <span class="options-caret" id="optionsCaret">›</span>
        </div>
        <div class="options-panel" id="optionsPanel">
          <div class="options-grid">
            <label class="opt-toggle">
              <input type="checkbox" id="opt_interface_status" checked onchange="updateOptionsLabel()">
              <span class="opt-slider"></span>
              <span class="opt-label">Interface Status</span>
              <span class="opt-desc">Port up/down, duplex, speed</span>
            </label>
            <label class="opt-toggle">
              <input type="checkbox" id="opt_error_counters" checked onchange="updateOptionsLabel()">
              <span class="opt-slider"></span>
              <span class="opt-label">Error Counters</span>
              <span class="opt-desc">CRC, input/output errors, runts</span>
            </label>
            <label class="opt-toggle">
              <input type="checkbox" id="opt_mtu_check" checked onchange="updateOptionsLabel()">
              <span class="opt-slider"></span>
              <span class="opt-label">MTU Check</span>
              <span class="opt-desc">MTU consistency across path</span>
            </label>
            <label class="opt-toggle">
              <input type="checkbox" id="opt_stp" checked onchange="updateOptionsLabel()">
              <span class="opt-slider"></span>
              <span class="opt-label">Spanning Tree</span>
              <span class="opt-desc">STP port roles and states</span>
            </label>
            <label class="opt-toggle">
              <input type="checkbox" id="opt_poe" checked onchange="updateOptionsLabel()">
              <span class="opt-slider"></span>
              <span class="opt-label">PoE Status</span>
              <span class="opt-desc">Power over Ethernet checks</span>
            </label>
            <label class="opt-toggle">
              <input type="checkbox" id="opt_neighbor_info" checked onchange="updateOptionsLabel()">
              <span class="opt-slider"></span>
              <span class="opt-label">Neighbor Info</span>
              <span class="opt-desc">CDP / LLDP per-port neighbor</span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <!-- Loading -->
    <div id="loadingState" class="loading-state hidden">
      <div class="spinner"></div>
      <div class="loading-text">Inspecting network path…</div>
      <div class="loading-sub">Querying network devices…</div>
    </div>

    <!-- Error -->
    <div id="errorState" class="error-state hidden">
      <div class="error-icon">⚠</div>
      <div id="errorMessage" class="error-message"></div>
    </div>

    <!-- Results -->
    <div id="resultsSection" class="results-section hidden">

      <!-- Summary bar -->
      <div class="summary-bar glass" id="summaryBar">
        <div class="summary-left">
          <span id="summaryIcon" class="summary-status-icon">✓</span>
          <div>
            <div id="summaryTitle" class="summary-title">Inspection complete</div>
            <div id="summaryMeta" class="summary-meta"></div>
          </div>
        </div>
        <div class="summary-badges" id="summaryBadges"></div>
      </div>

      <!-- Path visualization -->
      <div class="section-label">Network Path</div>
      <div class="path-container glass" id="pathContainer"></div>

      <!-- Issues panel -->
      <div id="issuesSection" class="hidden">
        <div class="section-label">Issues Found</div>
        <div class="issues-list glass" id="issuesList"></div>
      </div>

      <!-- Tests summary -->
      <div id="testsSection" class="hidden">
        <div class="section-label">Diagnostic Tests</div>
        <div class="tests-summary glass" id="testsSummary"></div>
      </div>

      <!-- Hop details -->
      <div class="section-label">Hop Details</div>
      <div id="hopDetails"></div>

    </div>

  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
